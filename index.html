<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portafolio de Presentaciones</title>

<style>

:root{
  --bg:#0a0f1c;
  --card:#111827;
  --accent:#00f5d4;
  --text:#f8fafc;
  --muted:#94a3b8;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Segoe UI, sans-serif;

  min-height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  width:90%;
  max-width:900px;
  text-align:center;
}

h1{
  color:var(--accent);
  margin-bottom:10px;
  font-size:3rem;
}

.subtitle{
  color:var(--muted);
  margin-bottom:40px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.card{
  background:var(--card);
  padding:25px;
  border-radius:15px;
  border:1px solid rgba(0,245,212,.2);

  transition:.3s;
}

.card:hover{
  transform:translateY(-5px);
  border-color:var(--accent);
}

.card h2{
  color:var(--accent);
  margin-bottom:10px;
}

.card p{
  color:var(--muted);
  margin-bottom:20px;
}

.btn{
  display:inline-block;

  text-decoration:none;

  background:var(--accent);
  color:#000;

  padding:10px 20px;
  border-radius:8px;

  font-weight:bold;
}

.footer{
  margin-top:40px;
  color:var(--muted);
  font-size:.9rem;
}

</style>
</head>
<body>

<div class="container">

<h1>📚 Portafolio de Presentaciones</h1>

<p class="subtitle">
Christian Hernández
</p>

<div class="cards">

<div class="card">

<h2>Tarea #996</h2>

<p>
Solución Estratificada de Problemas en TIC y Virtualización.
</p>

<a href="tarea996/" class="btn">
Abrir Presentación
</a>

</div>

<div class="card">

<h2>Tarea #997</h2>

<p>
Pizza as a Service 2.0 y Modelos de Servicio en la Nube.
</p>

<a href="tarea997/" class="btn">
Abrir Presentación
</a>

</div>

</div>

<div class="footer">
Repositorio académico • 2026
</div>

</div>

</body>
</html>
